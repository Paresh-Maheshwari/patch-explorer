name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  update-repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update repo description, homepage & topics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo edit ${{ github.repository }} \
            --description "Browse and search all ReVanced patch bundles — apps, patches, versions, changelogs" \
            --homepage "https://${{ github.repository_owner }}.github.io/patch-explorer/" \
            --add-topic revanced \
            --add-topic revanced-patches \
            --add-topic revanced-manager \
            --add-topic patch-bundles \
            --add-topic vite
